<div class="dashboard-container">
  <!-- Happy Theme - Colorful -->
  <div class="happy-theme">
    <div class="theme-indicator">
      <span class="mood-icon">😊</span>
      <span class="mood-text">Colorful Mode - You're Happy! 🎉</span>
    </div>
  </div>

  <!-- Dashboard Content -->
  <div class="dashboard-card">
    <div class="content">
      <div class="header">
        <div class="heart-rainbow">❤️🧡💛💚💙💜</div>
        <h1>Welcome to Your Happy Place! 🌈</h1>
      </div>

      <div class="welcome-section">
        <div class="greeting">
          <span class="wave">👋</span>
          <span class="message">{{ welcomeMessage }}</span>
        </div>
        
        <div class="user-profile">
          <div class="avatar">😄</div>
          <div class="user-details">
            <h2>{{ currentUser?.username }}</h2>
            <p>{{ currentUser?.email }}</p>
            <p class="member-since">Member since: {{ currentUser?.createdAt | date:'mediumDate' }}</p>
          </div>
        </div>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-icon">❤️</div>
            <div class="stat-info">
              <h3>Happiness</h3>
              <p>Level: 100%</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div class="stat-info">
              <h3>Joy</h3>
              <p>Unlimited</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🌈</div>
            <div class="stat-info">
              <h3>Colors</h3>
              <p>Everywhere!</p>
            </div>
          </div>
        </div>
      </div>

      <div class="action-section">
        <button class="logout-btn" (click)="onLogout()">
          Logout
        </button>
      </div>
    </div>
  </div>
</div>
